name: Build and Publish Flatpak

on:
  push:
    branches: [ main ]
    paths:
      - '**.json'
      - '**.sh'
      - '**.png'
      - '**.desktop'
      - '**.html'
  workflow_dispatch:
    inputs:
      version:
        description: 'MekHQ version (without v prefix, e.g. 0.50.11)'
        required: true
        default: '0.50.11'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: flatpak-repo-runner
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || '0.50.11' }}"
          # Strip leading 'v' if someone included it
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Building MekHQ v${VERSION}"

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          env-slug: prod
          project-slug: homelab-bz-gt
          secret-path: /
          export-type: env
          domain: http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080

      - name: Cache MekHQ tarball
        id: cache-tarball
        uses: actions/cache@v4
        with:
          path: mekhq.tar.gz
          key: mekhq-tarball-${{ steps.version.outputs.version }}

      - name: Configure AWS CLI for R2
        run: |
          aws configure set aws_access_key_id $FP_R2_ACCESS_KEY_ID
          aws configure set aws_secret_access_key $FP_R2_SECRET_ACCESS_KEY
          aws configure set region auto
          aws configure set output json

      - name: Download MekHQ tarball from R2
        id: download-tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE_NAME="MekHQ-${VERSION}.tar.gz"
          OBJECT_KEY="mekhq/${BUNDLE_NAME}"
          
           if aws --endpoint-url https://${FP_R2_ACCOUNT_ID}.r2.cloudflarestorage.com s3 ls s3://${FP_R2_BUCKET_NAME}/${OBJECT_KEY} 2>/dev/null; then
            echo "✓ Downloaded ${OBJECT_KEY} from R2"
          else
            echo "File not found in R2, downloading from GitHub releases"
            curl -L -o mekhq.tar.gz "https://github.com/MegaMek/mekhq/releases/download/v${VERSION}/MekHQ-${VERSION}.tar.gz"
            aws --endpoint-url https://${FP_R2_ACCOUNT_ID}.r2.cloudflarestorage.com s3 cp mekhq.tar.gz s3://${FP_R2_BUCKET_NAME}/${OBJECT_KEY}
            echo "✓ Uploaded ${OBJECT_KEY} to R2"
          fi
          ls -lh mekhq.tar.gz

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: mekhq-${{ steps.version.outputs.version_tag }}.flatpak
          manifest-path: com.megamek.mekhq.json
          cache-key: flatpak-builder-${{ hashFiles('com.megamek.mekhq.json', 'mekhq-wrapper.sh') }}

      - name: Upload flatpak to R2
        run: |
          VERSION_TAG="${{ steps.version.outputs.version_tag }}"
          BUNDLE_NAME="mekhq-${VERSION_TAG}.flatpak"
          
          aws --endpoint-url https://${FP_R2_ACCOUNT_ID}.r2.cloudflarestorage.com s3 cp ${BUNDLE_NAME} s3://${FP_R2_BUCKET_NAME}/flatpak/${BUNDLE_NAME}
          aws --endpoint-url https://${FP_R2_ACCOUNT_ID}.r2.cloudflarestorage.com s3 cp ${BUNDLE_NAME} s3://${FP_R2_BUCKET_NAME}/flatpak/mekhq-latest.flatpak
          
           echo "Uploaded ${BUNDLE_NAME} to R2"

      - name: Generate .flatpakrepo file
        run: |
          cat > mekhq.flatpakrepo <<EOF
          [Flatpak Repo]
          Title=MekHQ Flatpak Repository
          Url=https://dvystrcil.github.io/flatpak-repo/repo/
          Homepage=https://github.com/dvystrcil/flatpak-repo
          Description=Self-hosted MekHQ Flatpak repository (testing)
          DefaultBranch=master
          EOF

      - name: Prepare Pages directory
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_TAG="${{ steps.version.outputs.version_tag }}"
          BUNDLE_NAME="mekhq-${VERSION_TAG}.flatpak"

          mkdir -p pages-deploy
          cp -r repo pages-deploy/repo
          cp mekhq.flatpakrepo pages-deploy/
          cp "${BUNDLE_NAME}" pages-deploy/

          # Stable "latest" filename for predictable URL
          cp "${BUNDLE_NAME}" "pages-deploy/mekhq-latest.flatpak"

          # Substitute version placeholders in the index.html
          sed -e "s|__VERSION__|${VERSION}|g" \
              -e "s|__VERSION_TAG__|${VERSION_TAG}|g" \
              -e "s|__BUNDLE_NAME__|${BUNDLE_NAME}|g" \
              index.html > pages-deploy/index.html

          ls -la pages-deploy/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-deploy

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mekhq-flatpak-${{ steps.version.outputs.version_tag }}
          path: mekhq-${{ steps.version.outputs.version_tag }}.flatpak
          retention-days: 5

  deploy:
    needs: build
    runs-on: flatpak-repo-runner
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
