name: Test Flatpak Setup and Build

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: flatpack-runner
    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak from PPA
        run: |
          sudo add-apt-repository -y ppa:flatpak/stable
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak --version
          flatpak-builder --version

      - name: Test bwrap
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          bwrap --unshare-user --unshare-pid --bind / / true && echo "bwrap OK" || echo "bwrap failed"

      - name: Create test manifest
        run: |
          cat > test-manifest.json << 'MANIFEST'
          {
            "app-id": "test.app",
            "runtime": "org.freedesktop.Sdk",
            "runtime-version": "23.08",
            "sdk": "org.freedesktop.Sdk",
            "command": "echo",
            "finish-args": ["--share=network"],
            "modules": [
              {
                "name": "test",
                "buildsystem": "simple",
                "build-commands": ["echo 'Hello from flatpak!'"]
              }
            ]
          }
          MANIFEST

      - name: Test flatpak build
        run: |
          flatpak-builder --user --force-clean test-build test-manifest.json

      - name: Verify build
        run: |
          ls -la test-build
