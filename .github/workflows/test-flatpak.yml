name: Test Flatpak Setup and Build

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: flatpack-runner
    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak from PPA
        run: |
          sudo add-apt-repository -y ppa:flatpak/stable
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak --version
          flatpak-builder --version

      - name: Setup flatpak runtime
        run: |
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak --user install -y flathub org.freedesktop.Sdk/x86_64/23.08
          flatpak --user install -y flathub org.freedesktop.Platform/x86_64/23.08

      - name: Download and extract MekHQ
        run: |
          curl -L -o mekhq.tar.gz https://github.com/MegaMek/mekhq/releases/download/v0.50.12/MekHQ-0.50.12.tar.gz
          tar -xzf mekhq.tar.gz
          ls -la

      - name: Configure flatpak manifest for local build
        run: |
          cat > com.megamek.mekhq.json << 'MANIFEST'
          {
            "app-id": "com.megamek.mekhq",
            "runtime": "org.freedesktop.Platform",
            "runtime-version": "23.08",
            "sdk": "org.freedesktop.Sdk",
            "command": "bin/mekhq",
            "finish-args": [
              "--share=network",
              "--share=ipc",
              "--socket=fallback-x11",
              "--socket=wayland",
              "--device=dri",
              "--filesystem=home",
              "--filesystem=xdg-download"
            ],
            "modules": [
              {
                "name": "mekhq",
                "buildsystem": "simple",
                "build-commands": [
                  "mkdir -p /app/bin /app/mekhq/data /app/mekhq/docs /app/mekhq/lib /app/mekhq/logs /app/mekhq/mmconf",
                  "cp -r /app/sources/MekHQ-0.50.12/data/* /app/mekhq/data/",
                  "cp -r /app/sources/MekHQ-0.50.12/docs/* /app/mekhq/docs/",
                  "cp -r /app/sources/MekHQ-0.50.12/lib/* /app/mekhq/lib/",
                  "cp -r /app/sources/MekHQ-0.50.12/logs/* /app/mekhq/logs/",
                  "cp -r /app/sources/MekHQ-0.50.12/mmconf/* /app/mekhq/mmconf/",
                  "install -Dm755 /app/sources/mekhq-wrapper.sh /app/bin/mekhq",
                  "install -Dm644 /app/sources/mekhq.png /app/share/icons/hicolor/256x256/apps/com.megamek.mekhq.png",
                  "install -Dm644 /app/sources/com.megamek.mekhq.desktop /app/share/applications/com.megamek.mekhq.desktop"
                ],
                "sources": [
                  {
                    "type": "file",
                    "path": "mekhq-wrapper.sh"
                  },
                  {
                    "type": "file",
                    "path": "mekhq.png"
                  },
                  {
                    "type": "file",
                    "path": "com.megamek.mekhq.desktop"
                  },
                  {
                    "type": "file",
                    "path": "MekHQ-0.50.12",
                    "dest": "MekHQ-0.50.12"
                  }
                ]
              }
            ]
          }
          MANIFEST

      - name: Build Flatpak
        run: |
          flatpak-builder --user --force-clean build com.megamek.mekhq.json

      - name: Export Flatpak
        run: |
          flatpak build-export --user flatpak-repo build
          ls -la flatpak-repo
