name: Build Flatpak (PR validation)

on:
  pull_request:
    branches: [ main ]
    paths:
      - '**.json'
      - '**.sh'

jobs:
  build-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install Flatpak
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Setup Flatpak remote (Flathub)
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user flathub org.freedesktop.Platform/23.08 org.freedesktop.Sdk/23.08

      - name: Build MekHQ Flatpak (dry-run)
        run: |
          flatpak-builder --user --install --force-clean build com.megamek.mekhq.json --user
          # Don't install, just validate build succeeds
          flatpak build-finish build com.megamek.mekhq

      - name: Verify manifest structure
        run: |
          # Basic JSON validation
          python3 -c "import json; json.load(open('com.megamek.mekhq.json'))"
          echo "Manifest JSON is valid"

      - name: Check wrapper script
        run: |
          test -f mekhq-wrapper.sh && test -x mekhq-wrapper.sh || chmod +x mekhq-wrapper.sh
          echo "Wrapper script ready"