name: PR Validation - Flatpak Build

on:
  pull_request:
    branches: [ main ]
    paths:
      - '**.json'
      - '**.sh'
      - '**.png'
      - '**.desktop'

jobs:
  build-pr:
    name: Build MekHQ Flatpak (PR)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      
      - name: Build Flatpak (dry-run)
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: com.megamek.mekhq.json
          build-bundle: "false"
          run-tests: "false"
          verbose: "true"