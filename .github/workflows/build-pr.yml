name: Build Flatpak PR

on:
  pull_request:
    branches: [ main ]
    paths:
      - '**.json'
      - '**.sh'

jobs:
  build-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install Flatpak
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Setup Flathub
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user flathub org.freedesktop.Platform/23.08 org.freedesktop.Sdk/23.08

      - name: Build each Flatpak (PR validation)
        run: |
          for manifest in *.json; do
            if [ -f "$manifest" ]; then
              app_name=$(basename "$manifest" .json)
              echo "Building $app_name..."
              flatpak-builder --user --force-clean "build-$app_name" "$manifest"
              echo "✓ $app_name built successfully"
            fi
          done